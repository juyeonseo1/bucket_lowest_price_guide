name: Update Guide from Firebase

on:
  repository_dispatch:
    types: [firebase-update]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN }}
      
      - name: Update index.html content
        env:
          CONTENT: ${{ github.event.client_payload.content }}
        run: |
          echo "$CONTENT" > index.html
          git config user.name "guide-bot"
          git config user.email "bot@guide.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update guide content"
          git push
