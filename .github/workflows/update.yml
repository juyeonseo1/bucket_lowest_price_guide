name: Update Guide from Firebase

on:
  repository_dispatch:
    types: [firebase-update]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Install dependencies
        run: npm install node-fetch@2 cheerio

      - name: Fetch Firebase data and update index.html
        env:
          FIREBASE_URL: https://bucket-lowest-price-guide-default-rtdb.firebaseio.com/bucket_lowest_price_guide/v1.json
        run: |
          node <<'EOF'
          const fetch = require('node-fetch');
          const fs = require('fs');
          const cheerio = require('cheerio');

          async function main() {
            const res = await fetch(process.env.FIREBASE_URL);
            const data = await res.json();
            if (!data) { console.log('Firebase 데이터 없음'); return; }

            const html = fs.readFileSync('index.html', 'utf8');
            // HTML 구조(태그, CSS, JS)는 그대로 유지하고 내용(content)만 업데이트
            const $ = cheerio.load(html, { decodeEntities: false });

            // data-field 개별 요소만 업데이트 (HTML 구조 보존)
            Object.keys(data).forEach(key => {
              if (key.startsWith('sec_') || key === 'faq_items') return;
              const el = $('[data-field="' + key + '"]');
              if (el.length) {
                el.html(data[key]);
                console.log('필드 업데이트:', key);
              }
            });

            // faq_items 처리
            if (data.faq_items) {
              try {
                const items = JSON.parse(data.faq_items);
                const faqList = $('#faq-list');
                if (faqList.length && items.length > 0) {
                  const faqHtml = items.map(function(item) {
                    return '<div class="faq-item"><div class="faq-q" onclick="toggleFaq(this)"><span>' +
                      item.q + '</span><span class="arrow">▾</span></div><div class="faq-a">' +
                      item.a + '</div></div>';
                  }).join('');
                  faqList.html(faqHtml);
                  console.log('FAQ 업데이트 완료');
                }
              } catch(e) {
                console.log('faq_items 파싱 오류:', e.message);
              }
            }

            fs.writeFileSync('index.html', $.html());
            console.log('index.html 업데이트 완료');
          }

          main().catch(console.error);
          EOF

      - name: Commit and push
        run: |
          git config user.name "guide-bot"
          git config user.email "bot@guide.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update guide content from Firebase"
          git push
